<script>
function abrirWhatsApp(){

    var check = document.getElementById("confirmar");

    if(!check.checked){
        alert("Por favor, confirme que leu o estatuto.");
        return;
    }

    var numero = "244929311220";
    var mensagem = "Olá, sou novo membro da TUYE ANGOLA. Já fiz a minha inscrição.";

    var url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensagem);

    window.open(url, "_blank");
}
